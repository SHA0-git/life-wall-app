<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17382f">
  <meta name="description" content="异地两人的私密生活墙 PWA 原型">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="生活墙">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css">
  <title>生活墙</title>
</head>
<body>
  <div class="phone-shell">
    <header class="hero-header">
      <div class="status-row" aria-hidden="true">
        <span>9:41</span>
        <span class="status-icons">●●●  5G  ▱</span>
      </div>
      <div class="title-row">
        <div>
          <p class="eyebrow" id="screenEyebrow">SHARED WALL</p>
          <h1 id="screenTitle">生活墙</h1>
        </div>
        <div class="header-actions">
          <button class="icon-button" id="searchBtn" aria-label="搜索">⌕</button>
          <button class="icon-button" id="moreBtn" aria-label="更多">•••</button>
        </div>
      </div>
    </header>

    <main class="content-sheet">
      <section id="homeScreen" class="screen active" aria-label="生活墙"></section>
      <section id="timelineScreen" class="screen" aria-label="时间线"></section>
      <section id="themeScreen" class="screen" aria-label="个性化"></section>
    </main>

    <nav class="bottom-nav" aria-label="主导航">
      <button class="nav-item active" data-screen="home">
        <span class="nav-icon">⌂</span>
        <span>生活墙</span>
      </button>
      <button class="nav-item" data-screen="timeline">
        <span class="nav-icon">◷</span>
        <span>时间线</span>
      </button>
      <button class="nav-item" data-screen="theme">
        <span class="nav-icon">◎</span>
        <span>个性化</span>
      </button>
    </nav>
  </div>

  <button class="floating-add" id="openComposer" aria-label="新增内容">＋</button>

  <dialog id="composerDialog" class="composer">
    <form method="dialog" class="composer-card" id="composerForm">
      <div class="composer-head">
        <div>
          <p class="eyebrow dark">NEW ENTRY</p>
          <h2>添加到生活墙</h2>
        </div>
        <button class="close-button" id="closeComposer" type="button" aria-label="关闭">×</button>
      </div>
      <label>
        类型
        <select id="entryType">
          <option value="message">留言</option>
          <option value="letter">长信</option>
          <option value="plan">计划</option>
          <option value="photo">照片</option>
        </select>
      </label>
      <label>
        标题
        <input id="entryTitle" maxlength="40" placeholder="比如：今天想记录一句">
      </label>
      <label>
        内容
        <textarea id="entryBody" rows="5" maxlength="500" placeholder="写下想让 TA 看到的内容"></textarea>
      </label>
      <div class="composer-actions">
        <button class="secondary-action" value="cancel" type="button" id="cancelComposer">取消</button>
        <button class="primary-action" value="default" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status"></div>
  <script src="app.js"></script>
</body>
</html>
